# dobby-routes-loader configuration
# Edit this file to match your VyOS router environment.

# Upstream route list URL (one CIDR per line, # comments allowed)
UPSTREAM_URL="https://raw.githubusercontent.com/helixzz/dobby-routes/data/cn_routes_inverse.txt"

# Routing table number for injected routes
ROUTE_TABLE=111

# Next-hop gateway for all injected routes
NEXT_HOP="192.0.2.1"

# Outgoing interface
OUTGOING_DEV="eth0"

# Protocol tag — used to isolate our routes from kernel/BGP routes in the same table.
# Do not change unless you know what you're doing.
PROTO="static"

# Syslog tag (visible in `journalctl -t dobby-routes-loader`)
LOG_TAG="dobby-routes-loader"

# Persistent state directory (stores last-applied routes and run timestamp).
# Must be under /config/ to survive VyOS firmware upgrades.
STATE_DIR="/config/user-data/dobby-routes-loader"

# Minimum acceptable route count from upstream.
# If the fetched list has fewer routes than this, the script aborts
# to protect against a truncated/empty upstream nuking the table.
MIN_ROUTE_COUNT=1000

# Maximum number of private/reserved CIDRs tolerated before aborting.
# A few might appear from an aggregation edge case; many means the
# upstream is compromised or wrong.
MAX_PRIVATE_CIDRS=10

# curl timeout (seconds) for fetching the upstream list
CURL_TIMEOUT=60

# curl retry count
CURL_RETRIES=3
